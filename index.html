<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牙周随访记录工作台 - Periodontal Follow-up Workstation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                    <span class="logo-text">牙周随访工作台</span>
                </div>
                <div class="clinic-info">
                    <span class="clinic-name">悦齿牙周专科诊所</span>
                    <div class="doctor-selector">
                        <span class="selector-label">当前记录医生：</span>
                        <select class="doctor-select" id="doctorSelect">
                        </select>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="date-display">
                    <span class="date-label">今日</span>
                    <span class="date-value" id="currentDate">2026-06-20</span>
                </div>
                <div class="storage-indicator" title="数据已自动保存到本地">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    <span>本地存储</span>
                </div>
                <div class="notification-badge">
                    <span class="badge-icon">🔔</span>
                    <span class="badge-count" id="notificationCount">0</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="panel patient-queue" id="panelQueue">
                <div class="panel-header">
                <h2 class="panel-title">患者队列</h2>
                <div class="panel-actions">
                    <button class="btn-icon" title="刷新" id="refreshBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    </button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-label">风险等级筛选</div>
                <div class="filter-tags">
                    <button class="filter-tag active" data-filter="all">全部</button>
                    <button class="filter-tag risk-gingivitis" data-filter="gingivitis">轻度牙龈炎</button>
                    <button class="filter-tag risk-periodontitis" data-filter="periodontitis">疑似牙周炎</button>
                    <button class="filter-tag risk-implant" data-filter="implant">种植体周围维护</button>
                    <button class="filter-tag risk-ortho" data-filter="ortho">正畸洁治后</button>
                </div>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" class="search-input" placeholder="搜索患者姓名/编号" id="searchInput">
                </div>
            </div>

            <div class="patient-list" id="patientList">
            </div>
            </section>

            <section class="panel detail-panel" id="panelDetail">
                <div class="panel-header">
                <h2 class="panel-title">随访详情</h2>
                <div class="panel-actions">
                    <span class="patient-id-badge" id="patientIdBadge">--</span>
                    <button class="btn-icon" title="打印记录">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"/>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-2V7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/>
                        <rect x="6" y="14" width="12" height="8"/>
                    </svg>
                    </button>
                </div>
            </div>

            <div class="detail-content" id="detailContent">
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <p class="empty-text">请从左侧队列选择患者</p>
                </div>
            </div>
            </section>

            <section class="panel conclusion-panel" id="panelConclusion">
                <div class="panel-header">
                <h2 class="panel-title">复查结论</h2>
                <div class="panel-actions">
                    <span class="status-indicator" id="statusIndicator">待填写</span>
                </div>
            </div>

            <div class="conclusion-content" id="conclusionContent">
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <p class="empty-text">选择患者后填写复查结论</p>
                </div>
            </div>
            </section>
        </main>

        <footer class="app-footer">
            <div class="footer-left">
                <span class="footer-item">今日随访：<strong id="todayCount">0</strong> 位患者</span>
                <span class="footer-divider">|</span>
                <span class="footer-item">待处理：<strong id="pendingCount">0</strong> 位</span>
                <span class="footer-divider">|</span>
                <span class="footer-item">历史记录：<strong id="totalRecords">0</strong> 条</span>
            </div>
            <div class="footer-right">
                <span class="footer-item" id="saveStatus">数据已自动保存</span>
                <span class="version">v1.1.0</span>
            </div>
        </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
